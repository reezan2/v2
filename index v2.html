<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nantes en 180 Bars - Carte</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      height: 100% !important;
      overflow: hidden;
    }

    #map {
      position: absolute;
      top: 64px;
      left: 0;
      width: 100%;
      height: calc(100vh - 64px);
      z-index: 0;
    }

    header { z-index: 2000; }
    #bar-modal, #donation-modal { z-index: 9999; }
    .leaflet-top, .leaflet-bottom, .leaflet-control-container { z-index: 1000 !important; }

    .custom-marker { filter: drop-shadow(0 4px 6px rgb(0 0 0 / 0.1)); }
    .modal { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .leaflet-control-attribution {
      background: #10b981 !important;
      color: white !important;
      font-size: 11px;
    }
    .leaflet-control-attribution a {
      color: white !important;
      text-decoration: underline;
    }

    /* Zoom controls sous le header */
    .leaflet-top { top: 64px !important; }
  </style>
</head>
<body class="bg-zinc-50">

  <!-- HEADER (avec barre de recherche ajoutée) -->
<header class="fixed top-0 left-0 right-0 bg-emerald-700 text-white shadow-md h-16 z-50">
  <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
    
    <!-- Logo principal + Titre -->
    <div class="flex items-center gap-3 shrink-0">
      <img 
        src="LogoNantes180bars.png" 
        alt="Logo Nantes en 180 Bars" 
        class="h-10 w-auto object-contain"
      />
      <div class="flex items-baseline gap-1.5">
        <span class="font-bold tracking-tighter text-2xl">NANTES EN</span>
        <span class="font-black tracking-tighter text-amber-300 text-2xl">180 BARS</span>
      </div>
    </div>

    <!-- Barre de recherche au milieu -->
    <div class="flex-1 mx-4 relative max-w-md">
      <input 
        id="search-bar" 
        type="text" 
        placeholder="Rechercher un bar..." 
        class="w-full h-10 bg-white/20 rounded-full px-4 text-white placeholder-white/60 focus:outline-none focus:bg-white/30"
      />
      <div id="search-suggestions" class="absolute left-0 right-0 mt-1 bg-white rounded-2xl shadow-lg max-h-60 overflow-y-auto hidden"></div>
    </div>

    <!-- Boutons droite -->
    <div class="flex items-center gap-4 shrink-0">
      <!-- Instagram avec ton vrai logo -->
      <a 
        href="https://www.instagram.com/nantes_en_180_bars" 
        target="_blank" 
        class="w-10 h-10 transition rounded-2xl flex items-center justify-center hover:opacity-90"
      >
        <img 
          src="LogoInstagram.png" 
          alt="Instagram" 
          class="w-10 h-10 object-contain"
        >
      </a>
      
      <!-- Bouton donation (🍺 reste car c’est une icône, pas un fichier) -->
      <button 
        onclick="openDonationModal()" 
        class="w-10 h-10 bg-amber-300 hover:bg-amber-400 transition rounded-2xl flex items-center justify-center text-3xl text-emerald-700"
      >
        🍺
      </button>
    </div>
  </div>
</header>

  <div id="map"></div>

<!-- PANNEAU FILTRES -->
<div id="filter-panel" class="hidden fixed top-[76px] left-4 bg-white rounded-3xl shadow-2xl p-6 w-80 z-[2000] max-h-[calc(100vh-100px)] overflow-y-auto">
  <div class="flex justify-between items-center mb-5">
    <h3 class="text-xl font-bold text-zinc-900">Filtres</h3>
    <button onclick="closeFilterPanel()" class="text-3xl leading-none text-zinc-400 hover:text-zinc-600">×</button>
  </div>

  <!-- Filtre Notes -->
  <div class="mb-6">
    <p class="font-semibold text-zinc-700 mb-3">Note</p>
    <div class="grid grid-cols-2 gap-3 text-sm">
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="note-pepite" checked class="accent-emerald-600 w-4 h-4"> <span>Pépite</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="note-A" checked class="accent-emerald-600 w-4 h-4"> <span>A</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="note-B" checked class="accent-emerald-600 w-4 h-4"> <span>B</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="note-C" checked class="accent-emerald-600 w-4 h-4"> <span>C</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="note-D" checked class="accent-emerald-600 w-4 h-4"> <span>D</span></label>
    </div>
  </div>

  <!-- Filtre Prix PDLMC -->
  <div class="mb-8">
    <p class="font-semibold text-zinc-700 mb-3">Prix de la PDLMC</p>
    <div class="space-y-2.5 text-sm">
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="price-4" checked class="accent-emerald-600 w-4 h-4"> <span>Moins de 4€</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="price-5" checked class="accent-emerald-600 w-4 h-4"> <span>Moins de 5€</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="price-6" checked class="accent-emerald-600 w-4 h-4"> <span>Moins de 6€</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="price-7" checked class="accent-emerald-600 w-4 h-4"> <span>Moins de 7€</span></label>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="price-8" checked class="accent-emerald-600 w-4 h-4"> <span>Moins de 8€</span></label>
    </div>
  </div>

  <div class="flex gap-3 pt-4 border-t">
    <button onclick="resetFilters()" class="flex-1 py-3.5 border border-zinc-300 rounded-2xl font-medium text-zinc-700 hover:bg-zinc-50">Réinitialiser</button>
    <button onclick="applyFilters()" class="flex-1 py-3.5 bg-emerald-700 text-white rounded-2xl font-semibold hover:bg-emerald-800">Appliquer</button>
  </div>
</div>

<!-- MODAL BAR -->
<div id="bar-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[9999]">
  <div class="bg-white rounded-3xl max-w-sm sm:max-w-md w-full max-h-[90vh] overflow-y-auto shadow-2xl flex flex-col">
    <div class="relative">
      <div id="carousel" class="bg-zinc-200 flex items-center justify-center">
        <img id="modal-photo" class="w-full h-auto" alt="">
      </div>
      <div id="photo-counter" class="absolute bottom-4 right-4 bg-black/70 text-white text-xs px-3 py-1 rounded-full"></div>
    </div>

    <div class="p-5">
      <div class="flex justify-between items-start mb-4">
        <h2 id="modal-name" class="text-2xl font-bold text-zinc-900"></h2>
        <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-zinc-600">×</button>
      </div>

      <div class="flex gap-6 mb-5">
        <div>
          <span class="text-xs tracking-widest text-zinc-500">NOTE</span>
          <div id="modal-rating" class="text-5xl font-black leading-none"></div>
        </div>
        <div>
          <span class="text-xs tracking-widest text-zinc-500">PDLMC</span>
          <div id="modal-price" class="text-4xl font-semibold text-emerald-600"></div>
        </div>
      </div>

      <p id="modal-desc" class="text-zinc-600 leading-relaxed mb-6 text-[15.5px]"></p>

      <!-- Lien Instagram -->
      <a id="modal-ig" href="#" target="_blank" 
         class="block bg-emerald-700 hover:bg-emerald-800 transition-all text-white text-center py-4 rounded-3xl font-semibold mb-3">
        Voir la publication Instagram →
      </a>

      <!-- NOUVEAU BOUTON ITINÉRAIRE -->
      <button onclick="openItinerary()" 
              class="w-full flex items-center justify-center gap-3 bg-white border-2 border-emerald-700 hover:bg-emerald-50 text-emerald-700 py-4 rounded-3xl font-semibold transition-all">
        <span class="text-2xl">🗺️</span>
        Itinéraire vers ce bar
      </button>
    </div>
  </div>
</div>

  <!-- MODAL DONATION -->
  <div id="donation-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[9999]">
    <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-2xl flex flex-col">
      
      <!-- Contenu scrollable -->
      <div class="p-4 overflow-y-auto flex-1">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-zinc-900">Nous payer une conso 🍺</h3>
          <button onclick="closeDonationModal()" class="text-4xl leading-none text-zinc-400 hover:text-zinc-600">×</button>
        </div>

        <p class="text-zinc-600 mb-8 text-[15px]">Merci de soutenir l’équipe qui teste tous les bars de Nantes !</p>

        <!-- Boutons 5/10/20 – plus petits pour rentrer parfaitement -->
        <div class="grid grid-cols-3 gap-3 mb-8">
          <button onclick="donate(5)" 
                  class="bg-emerald-100 hover:bg-emerald-200 active:bg-emerald-300 transition py-3.5 rounded-3xl font-semibold text-lg h-12 flex items-center justify-center">
            5 €
          </button>
          <button onclick="donate(10)" 
                  class="bg-emerald-100 hover:bg-emerald-200 active:bg-emerald-300 transition py-3.5 rounded-3xl font-semibold text-lg h-12 flex items-center justify-center">
            10 €
          </button>
          <button onclick="donate(20)" 
                  class="bg-emerald-100 hover:bg-emerald-200 active:bg-emerald-300 transition py-3.5 rounded-3xl font-semibold text-lg h-12 flex items-center justify-center">
            20 €
          </button>
        </div>

        <!-- Champ + bouton Donner – tailles parfaitement alignées -->
        <div class="flex gap-3 items-stretch">
          <input 
            id="custom-amount" 
            type="number" 
            placeholder="Autre montant" 
            class="flex-1 border border-zinc-300 rounded-3xl px-5 py-3.5 text-center text-lg focus:outline-none focus:border-emerald-500 h-12"
          >
          <button 
            onclick="donateCustom()" 
            class="bg-emerald-700 hover:bg-emerald-800 text-white px-8 rounded-3xl font-semibold whitespace-nowrap min-w-[100px] text-lg h-12 flex items-center justify-center"
          >
            Donner
          </button>
        </div>

        <p class="text-center text-xs text-zinc-400 mt-8">Paiement simulé (démo)</p>
      </div>
    </div>
  </div>

  <script>
    
const bars = [
  {id:1, name:"Amère", lat:47.216979041336984, lng:-1.5595828827243843, rating:"B", color:"#b5dabe", pdlmc_price:"7,1€", description:"C’est un bar à bières situé à deux pas de la Tour de Bretagne. 🍺 Le bar est très sympa avec une jolie terrasse et un intérieur très chaleureux avec une borne de fléchettes ! 🎯", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DG583PDsSul/", photos:["photos/Amere.jpg"], isPépite:false},
  {id:2, name:"Atomic's Café", lat:47.21319270013995, lng:-1.5547751711643611, rating:"A", color:"#306629", pdlmc_price:"4,5€", description:"On avait testé l’Atomic's Café il y a maintenant 2 ans et le bar méritait bien une mise à jour ! Situé en plein centre ville de Nantes, l’intérieur est incroyable, une déco chaleureuse, des jeux", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DKXW8XYMngm/", photos:["photos/Atomic cafe.jpg"], isPépite:false},
  {id:3, name:"Au Bon Coin", lat:47.22232721422095, lng:-1.5592216709342013, rating:"B", color:"#b5dabe", pdlmc_price:"5,9€", description:"Il nous aura fallu plus de 130 bars pour poster un premier bar autour du marché de Talensac ! 🍅 Bienvenue Au Bon Coin qui comme son nom l’indique se situe au coin d’une rue juste en face le marché !", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DM8TjvJsN7s/", photos:["photos/Bon coin.jpg"], isPépite:false},
  {id:4, name:"Au Bureau", lat:47.20797206466239, lng:-1.5593105324203207, rating:"C", color:"#f4c280", pdlmc_price:"7€", description:"Au Bureau, c'st un pub/brasserie situé sur les bords de Loire juste à côté du tribunal ! L'été, le bar possède une terrasse idéalement situé au calme le long du fleuve, un bon plan si", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DEflENcIvgk/", photos:["photos/Bureau.jpg"], isPépite:false},
  {id:5, name:"Bagadou", lat:47.212876540168, lng:-1.5609009652368706, rating:"B", color:"#b5dabe", pdlmc_price:"5€", description:"Le Bagadou est de retour à la place du Mariole rue Jean-Jacques Rousseau ! En reprenant le bar, les nouveaux propriétaires ont redonné l’ancien nom de bar, on est parti tester ça pour vous ! 😎", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DJ7IbW7Mzxi/", photos:["photos/Bagadou.jpg"], isPépite:false},
  {id:6, name:"Bateau Lavoir", lat:47.22088696447233, lng:-1.5532570700785546, rating:"B", color:"#b5dabe", pdlmc_price:"7,5€", description:"Le Bateau Lavoir est une très belle péniche en bois située sur les bords de l'Erdre ! ☀️ Elle a reçu différentes modifications cette saison et ça valait bien une mise à jour du post !", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C-KncgGOSPT/", photos:["photos/Bateau lavoir.jpg"], isPépite:false},
  {id:7, name:"Bibou", lat:47.20695024270025, lng:-1.5504432054342356, rating:"A", color:"#306629", pdlmc_price:"5€", description:"Le Bibou est situé sur le Quai Hoche le long de la Loire. C'est un bar/bistro toute la journée où tu peux t'y poser pour le petit déj, le déjeuner ou pour y prendre un verre en soirée 😋", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C8SEy8NoHN3/", photos:["photos/Bibou.jpg"], isPépite:false},
  {id:8, name:"Black Pearl Café", lat:47.211542443878166, lng:-1.5454119747488047, rating:"D", color:"#d66643", pdlmc_price:"5,2€", description:"Le Black Pearl Café se situe quartier Madeleine près de la Cité des Congrès. C'est un bar tabac avec un intérieur assez grand, deux fléchettes 🎯, un billard 🎱 et des canapés bien confort 🥰", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C4gMvWQLSCL/", photos:["photos/Black pearl cafe.jpg"], isPépite:false},
  {id:9, name:"Boucan", lat:47.21237265956549, lng:-1.5468103243814169, rating:"A", color:"#306629", pdlmc_price:"5€", description:"C’est tout beau, c’est tout neuf, on te parle aujourd’hui de Boucan, un nouveau bar qui vient d’ouvrir rue Fouré ! 🤗 Boucan c’est un bistro où tu peux manger le midi et prendre un verre", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DR-AJzDjTpS/", photos:["photos/Boucan.jpg"], isPépite:false},
  {id:10, name:"Bubba Gum", lat:47.216077332037486, lng:-1.5524793459129322, rating:"A", color:"#306629", pdlmc_price:"4,5€", description:"Le Bubba Gump est un bar à cocktail situé en plein cœur du quartier Bouffay ! 🍹La terrasse n’est pas très grande mais l’intérieur est chaleureux avec une deco originale ! 🌿", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DDCxn38sWlK/", photos:["photos/Bubba gum.jpg"], isPépite:false},
  {id:11, name:"Buck Mulligan's", lat:47.21639501956994, lng:-1.5520990459129118, rating:"B", color:"#b5dabe", pdlmc_price:"4€", description:"Des pubs il y en a à Nantes, on te parle aujourd’hui du Buck Mulligan's ! Situé rue du Chateau en plein Bouffay, ce pub est très sympa et représente bien ce qu’on attend d’un pub irlandais ! ☘️", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DSX9RQSDVCy/", photos:["photos/Buck mulligan.jpg"], isPépite:false},
  {id:12, name:"Café de L'aubette", lat:47.22116784529858, lng:-1.5619507747482522, rating:"B", color:"#b5dabe", pdlmc_price:"6,4€", description:"On part aujourd’hui dans un coin un peu moins fréquenté du centre-ville mais tout aussi cool : la place Viarme ! Et super bien situé sur cette place, on te présente aujourd’hui le Café de l’Aubette. 😎", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DKKjJxHMDgg/", photos:["photos/Cafe aubette.jpg"], isPépite:false},
  {id:13, name:"Café du Commerce", lat:47.213591462998956, lng:-1.5581571035843798, rating:"C", color:"#f4c280", pdlmc_price:"4€", description:"Le Café du Commerce est le plus grand bar de la place du Commerce à Nantes. C'est sûrement le bar avec la plus grande terrasse du quartier, un bon spot pour profiter du soleil. ☀️", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C25NT78obhN/", photos:["photos/Commerce.jpg"], isPépite:false},
  {id:14, name:"Café Kleber", lat:47.214594224439395, lng:-1.5660037517430838, rating:"B", color:"#b5dabe", pdlmc_price:"8€", description:"Café Kleber se situe rue Kléber dans le quartier Copernic. C'est un bar assez cosy/guindé en cohérence avec ce quartier proche de Graslin. 🔰 On a beaucoup aimé l'atmosphère qu'il y règne", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C711iGwONGa/", photos:["photos/Cafe kleber.jpg"], isPépite:false},
  {id:15, name:"Café Le Bon Pasteur", lat:47.215708758052656, lng:-1.558772634269379, rating:"C", color:"#f4c280", pdlmc_price:"6€", description:"Le Bon Pasteur est un café nantais situé entre la Basilique St Nicolas, la rue du Calvaire et la place Royale. Discret d'extérieur, ce repère de jeunes habitués nantais cache une grande terrasse", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/CsbpE0oMALB/", photos:["photos/Bon pasteur.jpg"], isPépite:false},
  {id:16, name:"Canaille Café", lat:47.21612122001624, lng:-1.5568160160897158, rating:"C", color:"#f4c280", pdlmc_price:"3,9€", description:"Le Canaille Café se situe en plein centre-ville, le long de la ligne de tram, pas loin de Place du Cirque. 🚋 Cela peut d'ailleurs être un point négatif niveau bruit : avec le tram plus le passage", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C4JFB-Mrne7/", photos:["photos/Canaille.jpg"], isPépite:false},
  {id:17, name:"Cascabel", lat:47.213903437713746, lng:-1.553112003584357, rating:"A", color:"#306629", pdlmc_price:"4,3€", description:"Le Cascabel est un bar bien connu du quartier Feydeau. Il bénéficie d’une super terrasse, assez grande, parfaite pour les grands groupes. 🤗 L’intérieur est aussi très spacieux, avec", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DH1IbjKMUpl/", photos:["photos/Cascabel.jpg"], isPépite:false},
  {id:18, name:"Chauffe Marcel", lat:47.211206856661484, lng:-1.5495290594063624, rating:"B", color:"#b5dabe", pdlmc_price:"6€", description:"Le Chauffe Marcel se situe rue des Olivettes, tout près du Coup du Lapin. C'est un bistrot à l'ancienne et on adore l'atmosphère qui y règne ! 😍 À l'intérieur, on trouve quelques tables", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/C6i-6Ifot7w/", photos:["photos/Chauffe marcel.jpg"], isPépite:false},
  {id:19, name:"Cheese & Friends", lat:47.21405526191541, lng:-1.5643786459130802, rating:"Pépite", color:"#193f21", pdlmc_price:"6,5€", description:"Le Cheese and Friends est un bar qui a ouvert il y a un peu plus d'un an rue racine, en haut de la place Graslin. Comme son nom l'indique c'est un bar à fromages. 🧀 Tu y trouveras plusieurs", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/CxfYCBfIdbP/", photos:["photos/Cheese et friends.jpg"], isPépite:true},
  {id:20, name:"Chez les filles", lat:47.21700449432634, lng:-1.5585535652351308, rating:"A", color:"#306629", pdlmc_price:"6€", description:"Bienvenue au bar Chez les Filles ! 👧 Située dans le quartier Bretagne, c’est le bar/brasserie que l’on te fait découvrir aujourd’hui ! 👌 Situé rue des 2 ponts, le bar bénéficie d’un spot", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/DMFew6BIcMa/", photos:["photos/Chez les filles.jpg"], isPépite:false},
  {id:21, name:"Chez les Garçons", lat:47.21320321518196, lng:-1.5616538612557023, rating:"C", color:"#f4c280", pdlmc_price:"6,5€", description:"Chez les Garçons est un super bar pour siroter un cocktail dans l'un des plus beau quartier de Nantes ! 🍹🍸Tu y trouveras des cocktails qui changent de l'ordinaire mais aussi pas mal de vins", ig_link:"https://www.instagram.com/nantes_en_180_bars/p/CkWUfijI0DL/", photos:["photos/Chez les garcons.jpg"], isPépite:false},

    let map, pepiteIcon, currentBar, currentPhotoIndex = 0;

    function initMap() {
      map = L.map('map', { zoomControl: true }).setView([47.2184, -1.5536], 13.5);

// Bouton FILTRES au-dessus du zoom
const FilterControl = L.Control.extend({
  onAdd: function() {
    const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
    div.style.marginBottom = '4px';
    div.innerHTML = `
      <a href="#" title="Filtres" onclick="toggleFilterPanel(); return false;" 
         style="width:34px;height:34px;line-height:34px;text-align:center;font-size:18px;background:white;color:#10b981;border-radius:4px 4px 0 0;box-shadow:0 1px 4px rgba(0,0,0,0.2);">
        🔎
      </a>
    `;
    return div;
  }
});
map.addControl(new FilterControl({ position: 'topleft' }));

      // STYLE PIONEER avec TA CLÉ (exactement ce que tu voulais)
      L.tileLayer('https://{s}.tile.thunderforest.com/pioneer/{z}/{x}/{y}.png?apikey=8b46d9f2ad30440aac72699d4746657c', {
        attribution: '&copy; <a href="http://www.thunderforest.com/">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      }).addTo(map);

      pepiteIcon = L.icon({
        iconUrl: 'Pepite.png',        // ← corrigé en majuscule pour correspondre à ton fichier original
        iconSize: [42, 42],
        iconAnchor: [21, 21]
      });

     allMarkers = [];

bars.forEach(bar => {
  let marker;
  if (bar.isPépite) {
    marker = L.marker([bar.lat, bar.lng], { icon: pepiteIcon });
  } else {
    const html = `<div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-black text-2xl shadow-lg border-2 border-white" style="background-color:${bar.color}">${bar.rating}</div>`;
    const icon = L.divIcon({ className: 'custom-marker', html: html, iconSize: [36, 36], iconAnchor: [18, 18] });
    marker = L.marker([bar.lat, bar.lng], { icon });
  }

  marker.barData = bar;           // on attache les données du bar
  marker.addTo(map);
  marker.on('click', () => showBarModal(bar));
  allMarkers.push(marker);
});

      console.log('✅ Carte Pioneer chargée + ' + bars.length + ' bulles affichées');
    }

    function showBarModal(bar) {
    currentBar = bar;
    currentPhotoIndex = 0;
    document.getElementById('modal-name').textContent = bar.name;
    document.getElementById('modal-rating').innerHTML = bar.isPépite 
      ? `<img src="Pepite.png" class="w-16 h-16" alt="Pépite">` 
      : bar.rating;
    document.getElementById('modal-rating').style.color = bar.color;
    document.getElementById('modal-price').textContent = bar.pdlmc_price;
    const desc = bar.description || "Super bar à Nantes ! 🍺";
    document.getElementById('modal-desc').innerHTML = desc + ' <i>... lire la suite sur Instagram</i>';
    document.getElementById('modal-ig').href = bar.ig_link;
    document.getElementById('modal-photo').src = bar.photos[0] || 'https://via.placeholder.com/800x600/cccccc/333333?text=Photo+non+disponible';
    document.getElementById('bar-modal').classList.remove('hidden');
  }

    function renderCarousel() {
      document.getElementById('modal-photo').src = currentBar.photos[currentPhotoIndex];
      document.getElementById('photo-counter').textContent = `${currentPhotoIndex + 1}/${currentBar.photos.length}`;
    }
    function nextPhoto() { 
      currentPhotoIndex = (currentPhotoIndex + 1) % currentBar.photos.length; 
      renderCarousel(); 
    }
    function prevPhoto() { 
      currentPhotoIndex = (currentPhotoIndex - 1 + currentBar.photos.length) % currentBar.photos.length; 
      renderCarousel(); 
    }

    function closeModal() { document.getElementById('bar-modal').classList.add('hidden'); }
    function openDonationModal() { document.getElementById('donation-modal').classList.remove('hidden'); }
    function closeDonationModal() { document.getElementById('donation-modal').classList.add('hidden'); }
    function donate(amount) {
      alert(`🎉 Merci pour ton don de ${amount} € ! On va se payer une bonne PDLMC grâce à toi 🍻`);
      closeDonationModal();
    }
    function donateCustom() {
      const val = document.getElementById('custom-amount').value;
      if (val && parseFloat(val) > 0) donate(val);
      else alert("Entre un montant valide 🙂");
    }

    // Lancement
    window.addEventListener('load', initMap);

    // Fermeture Escape
    document.addEventListener('keydown', e => {
      if (e.key === "Escape") {
        document.getElementById('bar-modal').classList.add('hidden');
        document.getElementById('donation-modal').classList.add('hidden');
      }
    });
// Fonction pour montrer les suggestions
function showSuggestions(input) {
  const suggestionsDiv = document.getElementById('search-suggestions');
  suggestionsDiv.innerHTML = '';
  suggestionsDiv.classList.add('hidden');

  if (input.length < 2) return; // Minimum 2 caractères pour suggestions

  const filteredBars = bars.filter(bar => bar.name.toLowerCase().includes(input.toLowerCase()));

  if (filteredBars.length === 0) return;

  filteredBars.forEach(bar => {
    const suggestionItem = document.createElement('div');
    suggestionItem.classList.add('px-4', 'py-2', 'hover:bg-emerald-100', 'cursor-pointer', 'text-zinc-900');
    suggestionItem.textContent = bar.name;
    suggestionItem.onclick = () => {
      showBarModal(bar);
      document.getElementById('search-bar').value = '';
      suggestionsDiv.classList.add('hidden');
    };
    suggestionsDiv.appendChild(suggestionItem);
  });

  suggestionsDiv.classList.remove('hidden');
}

// Événement pour la barre de recherche
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('search-bar');
  searchInput.addEventListener('input', (e) => showSuggestions(e.target.value));

  // Fermer suggestions si clic ailleurs
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !document.getElementById('search-suggestions').contains(e.target)) {
      document.getElementById('search-suggestions').classList.add('hidden');
    }
  });
});

let allMarkers = [];

function toggleFilterPanel() {
  document.getElementById('filter-panel').classList.toggle('hidden');
}

function closeFilterPanel() {
  document.getElementById('filter-panel').classList.add('hidden');
}

function getSelectedNotes() {
  const notes = [];
  if (document.getElementById('note-pepite').checked) notes.push('Pépite');
  if (document.getElementById('note-A').checked) notes.push('A');
  if (document.getElementById('note-B').checked) notes.push('B');
  if (document.getElementById('note-C').checked) notes.push('C');
  if (document.getElementById('note-D').checked) notes.push('D');
  return notes;
}

function getPriceLimits() {
  const limits = [];
  if (document.getElementById('price-4').checked) limits.push(4);
  if (document.getElementById('price-5').checked) limits.push(5);
  if (document.getElementById('price-6').checked) limits.push(6);
  if (document.getElementById('price-7').checked) limits.push(7);
  if (document.getElementById('price-8').checked) limits.push(8);
  return limits;
}

function applyFilters() {
  const selectedNotes = getSelectedNotes();
  const priceLimits = getPriceLimits();

  allMarkers.forEach(marker => {
    const bar = marker.barData;
    let visible = true;

    // Filtre note
    if (selectedNotes.length > 0) {
      const note = bar.isPépite ? 'Pépite' : bar.rating;
      if (!selectedNotes.includes(note)) visible = false;
    }

    // Filtre prix
    if (visible && priceLimits.length > 0) {
      const priceStr = bar.pdlmc_price.replace(',', '.').replace('€', '').trim();
      const price = parseFloat(priceStr);
      if (isNaN(price)) visible = false;
      else visible = priceLimits.some(limit => price < limit);
    }

    marker.setOpacity(visible ? 1 : 0.15);
  });

// ====================== ITINÉRAIRE GOOGLE MAPS ======================
function openItinerary() {
  if (!currentBar || !currentBar.lat || !currentBar.lng) {
    alert("Position du bar non disponible.");
    return;
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        const url = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${currentBar.lat},${currentBar.lng}&travelmode=driving`;
        window.open(url, '_blank');
      },
      (error) => {
        // Si l'utilisateur refuse ou erreur → on centre juste sur le bar
        const fallback = `https://www.google.com/maps?q=${currentBar.lat},${currentBar.lng}`;
        window.open(fallback, '_blank');
      }
    );
  } else {
    // Navigateur sans géolocalisation
    const fallback = `https://www.google.com/maps?q=${currentBar.lat},${currentBar.lng}`;
    window.open(fallback, '_blank');
  }
}

  closeFilterPanel();
}

function resetFilters() {
  document.querySelectorAll('#filter-panel input[type="checkbox"]').forEach(cb => cb.checked = true);
  applyFilters();
}

  </script>
